<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - StudyFlow</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow" style="width: 350px;">

            <h3 class="text-center mb-3">StudyFlow</h3>

            <!-- FORM LOGIN -->
            <form>
                <input type="email" class="form-control mb-3" placeholder="Correo electrónico">
                <input type="password" class="form-control mb-3" placeholder="Contraseña">

                <button class="btn btn-primary w-100 mb-2">Iniciar sesión</button>
            </form>

            <p class="text-center mt-2">¿No tienes cuenta? <a href="#">Regístrate</a></p>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="assets/js/bootstrap.bundle.min.js"></script>

</body>
</html>
